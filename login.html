<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="utf-8"/>
        <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
        <title>
            Login - Nexora
        </title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
        <link href="style.css" rel="stylesheet"/>
    </head>
    <body class="bg-light min-vh-100">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
            <div class="container">
                <a class="navbar-brand d-flex align-items-center fw-bold fs-4" href="index.html">
                    <img alt="Logo Nexora" src="img/logo.png" style="height:45px; width:auto; margin-right:10px;"/>
                    <span>
                        NEXORA
                    </span>
                </a>
                <a class="btn btn-outline-light" href="index.html">
                    <i class="bi bi-arrow-left me-1">
                    </i>
                    Voltar para loja
                </a>
            </div>
        </nav>
        <main class="container py-5">
            <div class="row justify-content-center">
                <section class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
                    <div class="card border-0 shadow-sm rounded-3 p-4 p-md-5">
                        <div class="text-center mb-4">
                            <div class="bg-light text-warning rounded-3 d-inline-flex align-items-center justify-content-center fs-2 p-3 mb-3">
                                <i class="bi bi-person-circle">
                                </i>
                            </div>
                            <h2 class="fw-bold mb-1">
                                Entrar
                            </h2>
                            <p class="text-muted mb-0">
                                Digite os dados que voce cadastrou.
                            </p>
                        </div>
                        <div class="alert d-none" id="login-alerta" role="alert">
                        </div>
                        <form id="form-login">
                            <div class="mb-3">
                                <label class="form-label" for="login-email">
                                    E-mail
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="bi bi-envelope">
                                        </i>
                                    </span>
                                    <input class="form-control" id="login-email" placeholder="seuemail@exemplo.com" required="" type="email"/>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label" for="login-senha">
                                    Senha
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="bi bi-lock">
                                        </i>
                                    </span>
                                    <input class="form-control" id="login-senha" placeholder="Digite sua senha" required="" type="password"/>
                                    <button aria-label="Mostrar senha" class="btn btn-outline-secondary toggle-password" data-target="login-senha" type="button">
                                        <i class="bi bi-eye">
                                        </i>
                                    </button>
                                </div>
                            </div>
                            <div class="d-flex align-items-center justify-content-between mb-4">
                                <div class="form-check">
                                    <input checked="" class="form-check-input" id="lembrar-login" type="checkbox"/>
                                    <label class="form-check-label" for="lembrar-login">
                                        Continuar conectado
                                    </label>
                                </div>
                            </div>
                            <button class="btn btn-warning fw-bold w-100 py-2" type="submit">
                                <i class="bi bi-box-arrow-in-right me-1">
                                </i>
                                Entrar
                            </button>
                        </form>
                        <hr/>
                        <p class="text-center mb-0">
                            Ainda nao tem conta?
                            <a class="fw-bold text-warning text-decoration-none" href="cadastro.html">
                                Criar conta
                            </a>
                        </p>
                    </div>
                </section>
            </div>
        </main>
        <script>
            const loginForm = document.getElementById("form-login");
                                const loginAlerta = document.getElementById("login-alerta");

                                function mostrarMensagem(tipo, texto) {
                                                loginAlerta.className = "alert alert-" + tipo;
                                                loginAlerta.textContent = texto;
                                }

                                function buscarUsuarios() {
                                                return JSON.parse(localStorage.getItem("nexoraUsuarios")) || [];
                                }

                                document.querySelectorAll(".toggle-password").forEach((botao) => {
                                                botao.addEventListener("click", () => {
                                                                const input = document.getElementById(botao.dataset.target);
                                                                const icone = botao.querySelector("i");
                                                                const senhaVisivel = input.type === "text";

                                                                input.type = senhaVisivel ? "password" : "text";
                                                                icone.className = senhaVisivel ? "bi bi-eye" : "bi bi-eye-slash";
                                                });
                                });

                                loginForm.addEventListener("submit", (evento) => {
                                                evento.preventDefault();

                                                const email = document.getElementById("login-email").value.trim().toLowerCase();
                                                const senha = document.getElementById("login-senha").value;
                                                const manterConectado = document.getElementById("lembrar-login").checked;
                                                const usuarios = buscarUsuarios();

                                                const usuario = usuarios.find((item) => item.email === email && item.senha === senha);

                                                if (!usuario) {
                                                                mostrarMensagem("danger", "E-mail ou senha incorretos. Verifique os dados e tente novamente.");
                                                                return;
                                                }

                                                const usuarioLogado = {
                                                                nome: usuario.nome,
                                                                email: usuario.email,
                                                                conectadoEm: new Date().toISOString()
                                                };

                                                if (manterConectado) {
                                                                localStorage.setItem("nexoraUsuarioLogado", JSON.stringify(usuarioLogado));
                                                } else {
                                                                sessionStorage.setItem("nexoraUsuarioLogado", JSON.stringify(usuarioLogado));
                                                }

                                                mostrarMensagem("success", "Login realizado com sucesso! Voltando para a loja...");

                                                setTimeout(() => {
                                                                window.location.href = "index.html";
                                                }, 1200);
                                });
        </script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
        </script>
    </body>
</html>
