<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="utf-8"/>
        <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
        <title>
            Cadastro - Nexora
        </title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
        <link href="style.css" rel="stylesheet"/>
    </head>
    <body class="bg-light min-vh-100">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
            <div class="container">
                <a class="navbar-brand d-flex align-items-center fw-bold fs-4" href="index.html">
                    <img alt="Logo Nexora" src="img/logo.png" style="height:45px; width:auto; margin-right:10px;"/>
                    <span>
                        NEXORA
                    </span>
                </a>
                <a class="btn btn-outline-light" href="index.html">
                    <i class="bi bi-arrow-left me-1">
                    </i>
                    Voltar para loja
                </a>
            </div>
        </nav>
        <main class="container py-5">
            <div class="row justify-content-center">
                <section class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
                    <div class="card border-0 shadow-sm rounded-3 p-4 p-md-5">
                        <div class="text-center mb-4">
                            <div class="bg-light text-warning rounded-3 d-inline-flex align-items-center justify-content-center fs-2 p-3 mb-3">
                                <i class="bi bi-person-plus">
                                </i>
                            </div>
                            <h2 class="fw-bold mb-1">
                                Criar conta
                            </h2>
                            <p class="text-muted mb-0">
                                Depois disso voce ja pode fazer login.
                            </p>
                        </div>
                        <div class="alert d-none" id="cadastro-alerta" role="alert">
                        </div>
                        <form id="form-cadastro">
                            <div class="mb-3">
                                <label class="form-label" for="cadastro-nome">
                                    Nome completo
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="bi bi-person">
                                        </i>
                                    </span>
                                    <input class="form-control" id="cadastro-nome" minlength="3" placeholder="Digite seu nome completo" required="" type="text"/>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label" for="cadastro-email">
                                    E-mail
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="bi bi-envelope">
                                        </i>
                                    </span>
                                    <input class="form-control" id="cadastro-email" placeholder="seuemail@exemplo.com" required="" type="email"/>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label" for="cadastro-senha">
                                    Senha
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="bi bi-lock">
                                        </i>
                                    </span>
                                    <input class="form-control" id="cadastro-senha" minlength="6" placeholder="Minimo de 6 caracteres" required="" type="password"/>
                                    <button aria-label="Mostrar senha" class="btn btn-outline-secondary toggle-password" data-target="cadastro-senha" type="button">
                                        <i class="bi bi-eye">
                                        </i>
                                    </button>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label" for="cadastro-confirmar">
                                    Confirmar senha
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="bi bi-shield-lock">
                                        </i>
                                    </span>
                                    <input class="form-control" id="cadastro-confirmar" minlength="6" placeholder="Repita sua senha" required="" type="password"/>
                                    <button aria-label="Mostrar senha" class="btn btn-outline-secondary toggle-password" data-target="cadastro-confirmar" type="button">
                                        <i class="bi bi-eye">
                                        </i>
                                    </button>
                                </div>
                            </div>
                            <button class="btn btn-warning fw-bold w-100 py-2" type="submit">
                                <i class="bi bi-check-circle me-1">
                                </i>
                                Cadastrar
                            </button>
                        </form>
                        <hr/>
                        <p class="text-center mb-0">
                            Ja tem uma conta?
                            <a class="fw-bold text-warning text-decoration-none" href="login.html">
                                Fazer login
                            </a>
                        </p>
                    </div>
                </section>
            </div>
        </main>
        <script>
            const cadastroForm = document.getElementById("form-cadastro");
                                const cadastroAlerta = document.getElementById("cadastro-alerta");

                                function mostrarMensagem(tipo, texto) {
                                                cadastroAlerta.className = "alert alert-" + tipo;
                                                cadastroAlerta.textContent = texto;
                                }

                                function buscarUsuarios() {
                                                return JSON.parse(localStorage.getItem("nexoraUsuarios")) || [];
                                }

                                function salvarUsuarios(usuarios) {
                                                localStorage.setItem("nexoraUsuarios", JSON.stringify(usuarios));
                                }

                                document.querySelectorAll(".toggle-password").forEach((botao) => {
                                                botao.addEventListener("click", () => {
                                                                const input = document.getElementById(botao.dataset.target);
                                                                const icone = botao.querySelector("i");
                                                                const senhaVisivel = input.type === "text";

                                                                input.type = senhaVisivel ? "password" : "text";
                                                                icone.className = senhaVisivel ? "bi bi-eye" : "bi bi-eye-slash";
                                                });
                                });

                                cadastroForm.addEventListener("submit", (evento) => {
                                                evento.preventDefault();

                                                const nome = document.getElementById("cadastro-nome").value.trim();
                                                const email = document.getElementById("cadastro-email").value.trim().toLowerCase();
                                                const senha = document.getElementById("cadastro-senha").value;
                                                const confirmarSenha = document.getElementById("cadastro-confirmar").value;
                                                const usuarios = buscarUsuarios();

                                                if (senha !== confirmarSenha) {
                                                                mostrarMensagem("danger", "As senhas nao conferem. Digite novamente.");
                                                                return;
                                                }

                                                if (usuarios.some((usuario) => usuario.email === email)) {
                                                                mostrarMensagem("warning", "Este e-mail ja esta cadastrado. Use outro e-mail ou faca login.");
                                                                return;
                                                }

                                                usuarios.push({
                                                                nome: nome,
                                                                email: email,
                                                                senha: senha,
                                                                criadoEm: new Date().toISOString()
                                                });

                                                salvarUsuarios(usuarios);
                                                mostrarMensagem("success", "Conta criada com sucesso! Voce sera levado para o login...");
                                                cadastroForm.reset();

                                                setTimeout(() => {
                                                                window.location.href = "login.html";
                                                }, 1400);
                                });
        </script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
        </script>
    </body>
</html>
